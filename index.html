<!DOCTYPE html>
<html lang="ja" data-theme="light">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Diary List</title>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;500&family=Playfair+Display+SC:wght@400&family=Cormorant+Garamond:ital,wght@0,300;0,400;1,300;1,400;1,600&family=Noto+Serif+JP:wght@200;300;400&family=Noto+Sans+JP:wght@300;400&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{margin:0;padding:0;box-sizing:border-box;}
button{cursor:pointer;font-family:inherit;border:none;background:none;}
html,body{min-height:100%;}
body{font-family:'Noto Sans JP',sans-serif;min-height:100vh;display:flex;flex-direction:column;align-items:center;padding:0 16px 120px;position:relative;overflow-x:hidden;background:#f8f6f4;color:#1a1410;transition:background 1.0s,color 0.7s;}
[data-theme="dark"] body{background:#1a1612;color:#f0ebe2;}
.bg-blobs{position:fixed;inset:0;z-index:0;pointer-events:none;overflow:hidden;}
.blob{position:absolute;border-radius:50%;animation:blobDrift ease-in-out infinite;}
[data-theme="light"] .b1{width:800px;height:800px;background:radial-gradient(circle,rgba(var(--ar),var(--ag),var(--ab),0.18) 0%,transparent 65%);top:-250px;left:-250px;animation-duration:26s;}
[data-theme="light"] .b2{width:700px;height:700px;background:radial-gradient(circle,rgba(var(--ar),var(--ag),var(--ab),0.12) 0%,transparent 65%);top:5%;right:-250px;animation-duration:32s;animation-delay:-10s;}
[data-theme="light"] .b3{width:600px;height:600px;background:radial-gradient(circle,rgba(var(--ar),var(--ag),var(--ab),0.10) 0%,transparent 65%);bottom:-150px;left:10%;animation-duration:38s;animation-delay:-22s;}
[data-theme="light"] .b4{width:500px;height:500px;background:radial-gradient(circle,rgba(var(--ar),var(--ag),var(--ab),0.08) 0%,transparent 65%);bottom:5%;right:0%;animation-duration:29s;animation-delay:-7s;}
[data-theme="dark"] .b1{width:900px;height:900px;background:radial-gradient(circle,rgba(var(--ar),var(--ag),var(--ab),0.28) 0%,transparent 60%);top:-300px;left:-300px;animation-duration:26s;}
[data-theme="dark"] .b2{width:700px;height:700px;background:radial-gradient(circle,rgba(var(--ar),var(--ag),var(--ab),0.18) 0%,transparent 60%);top:5%;right:-250px;animation-duration:32s;animation-delay:-10s;}
[data-theme="dark"] .b3{width:650px;height:650px;background:radial-gradient(circle,rgba(var(--ar),var(--ag),var(--ab),0.14) 0%,transparent 60%);bottom:-150px;left:10%;animation-duration:38s;animation-delay:-22s;}
[data-theme="dark"] .b4{width:550px;height:550px;background:radial-gradient(circle,rgba(var(--ar),var(--ag),var(--ab),0.12) 0%,transparent 60%);bottom:5%;right:0%;animation-duration:29s;animation-delay:-7s;}
@keyframes blobDrift{0%{transform:translate(0,0) scale(1);}25%{transform:translate(60px,-70px) scale(1.05);}50%{transform:translate(-50px,85px) scale(0.95);}75%{transform:translate(75px,45px) scale(1.04);}100%{transform:translate(0,0) scale(1);}}
:root{--ah:205;--as:18%;--al:72%;--accent:hsl(var(--ah),var(--as),var(--al));--ar:168;--ag:190;--ab:200;}

.top-bar{position:fixed;bottom:24px;right:16px;z-index:300;}
.tb-pill{display:flex;align-items:center;gap:4px;background:rgba(255,255,255,0.82);border:1px solid rgba(255,255,255,0.95);backdrop-filter:blur(20px) saturate(1.4);-webkit-backdrop-filter:blur(20px) saturate(1.4);border-radius:50px;padding:5px 12px 5px 6px;box-shadow:0 4px 20px rgba(0,0,0,0.08),0 1px 0 rgba(255,255,255,1) inset;}
[data-theme="dark"] .tb-pill{background:rgba(40,38,35,0.88);border-color:rgba(255,255,255,0.18);box-shadow:0 4px 20px rgba(0,0,0,0.40);}
.icon-btn{width:34px;height:34px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:15px;transition:transform 0.22s;}
.icon-btn:hover{transform:scale(1.15) rotate(12deg);}
.color-picker-wrap{position:relative;}
.color-panel{position:absolute;bottom:46px;right:0;background:rgba(255,255,255,0.82);backdrop-filter:blur(32px) saturate(1.5);-webkit-backdrop-filter:blur(32px) saturate(1.5);border:1px solid rgba(255,255,255,0.92);border-radius:22px;padding:18px;box-shadow:0 16px 48px rgba(0,0,0,0.07);width:260px;display:none;flex-direction:column;gap:12px;animation:popIn 0.2s ease;z-index:400;}
[data-theme="dark"] .color-panel{background:rgba(40,36,32,0.92);border-color:rgba(255,255,255,0.14);}
.color-panel.open{display:flex;}
@keyframes popIn{from{opacity:0;transform:translateY(-8px) scale(0.96);}to{opacity:1;transform:translateY(0) scale(1);}}
.panel-label{font-family:'Noto Serif JP',serif;font-size:10px;letter-spacing:0.20em;color:rgba(26,20,16,0.38);text-transform:uppercase;}
[data-theme="dark"] .panel-label{color:rgba(240,235,226,0.40);}
.swatches{display:flex;flex-wrap:wrap;gap:8px;}
.swatch{width:27px;height:27px;border-radius:50%;border:2.5px solid transparent;transition:transform 0.17s,border-color 0.17s;cursor:pointer;}
.swatch:hover{transform:scale(1.2);}
.swatch.active{border-color:rgba(26,20,16,0.35);}
[data-theme="dark"] .swatch.active{border-color:rgba(240,235,226,0.50);}
.custom-row{display:flex;align-items:center;gap:10px;}
.custom-row input[type="color"]{width:30px;height:30px;border:none;border-radius:50%;cursor:pointer;padding:0;background:none;}
.custom-row span{font-family:'Noto Serif JP',serif;font-size:11px;color:rgba(26,20,16,0.38);}
[data-theme="dark"] .custom-row span{color:rgba(240,235,226,0.40);}

.title-block{position:relative;z-index:1;text-align:center;padding:48px 0 14px;width:calc(100% + 32px);margin-left:-16px;max-width:none;}
.site-title{font-family:'Playfair Display SC',serif;font-style:normal;font-weight:400;font-size:min(8vw,52px);letter-spacing:0.18em;line-height:1;color:rgba(26,20,16,0.20);transition:color 0.5s;margin:0;display:flex;align-items:center;width:100%;white-space:nowrap;}
.site-title-text{display:inline-block;padding:0 clamp(14px,3vw,28px);text-transform:uppercase;}
[data-theme="dark"] .site-title{color:rgba(240,235,226,0.28);}
.t-line{display:block;flex:1;height:0.5px;background:rgba(26,20,16,0.22);min-width:40px;}
[data-theme="dark"] .t-line{background:rgba(240,235,226,0.22);}
.site-sub{font-family:'Noto Serif JP',serif;font-weight:200;font-size:10px;letter-spacing:0.38em;text-transform:uppercase;color:rgba(26,20,16,0.26);margin-top:16px;}
[data-theme="dark"] .site-sub{color:rgba(240,235,226,0.30);}

/* DATE NAV */
.date-nav{display:flex;align-items:center;justify-content:center;gap:16px;margin-top:12px;}
.date-nav-btn{width:30px;height:30px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:16px;color:rgba(26,20,16,0.28);background:rgba(255,255,255,0.42);border:1px solid rgba(255,255,255,0.72);backdrop-filter:blur(10px);transition:all 0.2s;}
[data-theme="dark"] .date-nav-btn{color:rgba(240,235,226,0.35);background:rgba(255,255,255,0.08);border-color:rgba(255,255,255,0.15);}
.date-nav-btn:hover{color:var(--accent);background:rgba(255,255,255,0.68);transform:scale(1.1);}
.date-nav-btn:disabled{opacity:0.15;pointer-events:none;}
.date-line{font-family:'Noto Serif JP',serif;font-weight:200;font-size:15px;letter-spacing:0.10em;color:rgba(26,20,16,0.50);min-width:220px;text-align:center;transition:all 0.3s;}
[data-theme="dark"] .date-line{color:rgba(240,235,226,0.52);}
.date-line.past{color:var(--accent);}

/* WRAPPER SLIDE */
.wrapper{position:relative;z-index:1;width:100%;max-width:560px;display:flex;flex-direction:column;gap:28px;transition:transform 0.32s cubic-bezier(.22,.8,.36,1),opacity 0.28s;}
.wrapper.slide-left-out{transform:translateX(-80px);opacity:0;pointer-events:none;}
.wrapper.slide-right-out{transform:translateX(80px);opacity:0;pointer-events:none;}
.wrapper.slide-left-in{transform:translateX(80px);opacity:0;}
.wrapper.slide-right-in{transform:translateX(-80px);opacity:0;}

/* CARD */
.card{background:rgba(255,255,255,0.55);backdrop-filter:blur(40px) saturate(1.8) brightness(1.08);-webkit-backdrop-filter:blur(40px) saturate(1.8) brightness(1.08);border:1px solid rgba(255,255,255,0.90);border-bottom:1px solid rgba(255,255,255,0.60);border-right:1px solid rgba(255,255,255,0.60);border-radius:28px;padding:30px 24px 26px 24px;box-shadow:0 1px 0 rgba(255,255,255,1) inset,0 4px 24px rgba(160,150,140,0.08),0 1px 8px rgba(160,150,140,0.06);position:relative;overflow:visible;}
[data-theme="dark"] .card{background:rgba(255,255,255,0.08);border-color:rgba(255,255,255,0.16);box-shadow:0 1px 0 rgba(255,255,255,0.10) inset,0 8px 32px rgba(0,0,0,0.35);}
.card::before{content:'';position:absolute;top:0;left:5%;right:5%;height:1px;background:linear-gradient(90deg,transparent,rgba(255,255,255,1) 30%,rgba(255,255,255,1) 70%,transparent);border-radius:50%;}
.card::after{content:'';position:absolute;inset:0;border-radius:32px;background:linear-gradient(135deg,rgba(255,255,255,0.55) 0%,rgba(255,255,255,0.10) 40%,rgba(255,255,255,0.02) 100%);pointer-events:none;}
.card-title{font-family:'Cormorant Garamond',serif;font-style:italic;font-weight:300;font-size:21px;color:rgba(26,20,16,0.28);text-align:center;letter-spacing:0.06em;margin-bottom:5px;position:relative;z-index:1;}
[data-theme="dark"] .card-title{color:rgba(240,235,226,0.45);}
.card-rule{width:20px;height:1px;background:rgba(26,20,16,0.07);margin:0 auto 20px;}
[data-theme="dark"] .card-rule{background:rgba(240,235,226,0.12);}
.past-note{text-align:center;font-family:'Noto Serif JP',serif;font-size:10px;letter-spacing:0.14em;color:var(--accent);opacity:0.75;margin-bottom:16px;position:relative;z-index:1;display:none;}

/* CATS */
.cat-area{position:relative;z-index:2;display:flex;flex-direction:column;gap:8px;margin-bottom:16px;}
.cat-tabs-wrap{position:relative;width:100%;}
.cat-tabs-wrap::after{content:'';position:absolute;top:0;right:0;bottom:0;width:52px;background:linear-gradient(to right,transparent,rgba(255,255,255,0.95));pointer-events:none;border-radius:0 8px 8px 0;}
[data-theme="dark"] .cat-tabs-wrap::after{background:linear-gradient(to right,transparent,rgba(30,28,26,0.95));}
.cat-tabs{display:flex;gap:6px;flex-wrap:nowrap;overflow-x:auto;justify-content:flex-start;scrollbar-width:none;-ms-overflow-style:none;padding:2px 36px 4px 2px;}
.cat-tabs::-webkit-scrollbar{display:none;}
.cat-tab{padding:5px 14px;border-radius:20px;font-family:'Noto Serif JP',serif;font-weight:300;font-size:11px;letter-spacing:0.06em;background:rgba(255,255,255,0.40);border:1px solid rgba(26,20,16,0.15);color:rgba(26,20,16,0.62);transition:all 0.22s;box-shadow:0 1px 6px rgba(0,0,0,0.03);white-space:nowrap;flex-shrink:0;}
[data-theme="dark"] .cat-tab{background:rgba(255,255,255,0.10);border-color:rgba(255,255,255,0.30);color:rgba(240,235,226,0.70);}
.cat-tab:hover{background:rgba(255,255,255,0.65);}
.cat-tab.active{background:var(--accent);color:#fff;border-color:transparent;box-shadow:0 3px 12px hsl(var(--ah),var(--as),var(--al),0.30);}
.del-cat{display:none;margin-left:5px;font-size:9px;opacity:0.7;}
.cat-tab.edit-mode .del-cat{display:inline;}
.cat-tab.edit-mode{border-color:rgba(200,0,0,0.15);}
.add-cat-row{display:flex;gap:6px;justify-content:center;align-items:center;overflow:hidden;max-height:0;opacity:0;transition:max-height 0.3s ease,opacity 0.3s ease;}
.add-cat-row.open{max-height:60px;opacity:1;}
.add-cat-input{width:130px;background:rgba(255,255,255,0.55);border:1px solid rgba(255,255,255,0.80);border-radius:11px;padding:7px 12px;font-family:'Noto Serif JP',serif;font-size:16px;font-weight:300;color:#1a1410;outline:none;text-align:center;backdrop-filter:blur(12px);transition:all 0.22s;}
[data-theme="dark"] .add-cat-input{background:rgba(255,255,255,0.09);border-color:rgba(255,255,255,0.14);color:#f0ebe2;}
.add-cat-input::placeholder{color:rgba(26,20,16,0.28);}
.add-cat-input:focus{border-color:var(--accent);box-shadow:0 0 0 3px hsl(var(--ah),var(--as),var(--al),0.15);}
.add-cat-confirm{padding:7px 14px;border-radius:11px;background:var(--accent);color:#fff;font-family:'Noto Serif JP',serif;font-size:11px;letter-spacing:0.05em;transition:all 0.2s;}
.add-cat-confirm:hover{opacity:0.88;transform:scale(1.04);}
.cat-manage{display:flex;gap:6px;justify-content:center;}
.cat-manage-btn{font-family:'Noto Serif JP',serif;font-size:10px;letter-spacing:0.08em;color:rgba(26,20,16,0.30);padding:3px 10px;border-radius:12px;border:1px solid rgba(26,20,16,0.08);transition:all 0.2s;}
[data-theme="dark"] .cat-manage-btn{color:rgba(240,235,226,0.32);border-color:rgba(240,235,226,0.12);}
.cat-manage-btn:hover{color:rgba(26,20,16,0.55);background:rgba(255,255,255,0.55);}
.cat-manage-btn.active{color:var(--accent);border-color:var(--accent);}

.add-row{display:flex;gap:8px;align-items:center;margin-bottom:16px;position:relative;z-index:1;}
.add-row input{flex:1;min-width:0;background:rgba(255,255,255,0.42);border:1px solid rgba(255,255,255,0.74);border-radius:14px;padding:11px 14px;font-family:'Noto Serif JP',serif;font-size:16px;font-weight:300;color:#1a1410;outline:none;text-align:center;letter-spacing:0.04em;backdrop-filter:blur(16px);-webkit-backdrop-filter:blur(16px);transition:all 0.25s;}
[data-theme="dark"] .add-row input{background:rgba(255,255,255,0.09);border-color:rgba(255,255,255,0.16);color:#f0ebe2;}
.add-row input::placeholder{color:rgba(26,20,16,0.28);}
[data-theme="dark"] .add-row input::placeholder{color:rgba(240,235,226,0.30);}
.add-row input:focus{border-color:var(--accent);background:rgba(255,255,255,0.65);box-shadow:0 0 0 3px hsl(var(--ah),var(--as),var(--al),0.14);}
[data-theme="dark"] .add-row input:focus{background:rgba(255,255,255,0.14);}
.add-btn{width:40px;height:40px;border-radius:50%;background:var(--accent);color:#fff;font-size:22px;display:flex;align-items:center;justify-content:center;flex-shrink:0;line-height:1;transition:transform 0.2s,box-shadow 0.2s;box-shadow:0 4px 16px hsl(var(--ah),var(--as),var(--al),0.35);}
.add-btn:hover{transform:scale(1.12);}
.add-btn:active{transform:scale(0.90);}

.task-list{display:flex;flex-direction:column;gap:9px;position:relative;z-index:1;overflow:visible;}
.task-item{display:flex;align-items:center;gap:12px;padding:13px 20px;margin:0 -14px;border-radius:18px;background:rgba(255,255,255,0.44);border:1px solid rgba(26,20,16,0.10);backdrop-filter:blur(24px) saturate(1.4);-webkit-backdrop-filter:blur(24px) saturate(1.4);box-shadow:0 1px 0 rgba(255,255,255,0.90) inset,0 2px 10px rgba(0,0,0,0.04);transition:transform 0.38s cubic-bezier(.12,.80,0,1.22),box-shadow 0.38s ease,background 0.25s;animation:fadeUp 0.3s ease both;position:relative;flex-wrap:wrap;user-select:none;-webkit-user-select:none;-webkit-touch-callout:none;}
[data-theme="dark"] .task-item{background:rgba(255,255,255,0.08);border-color:rgba(255,255,255,0.22);box-shadow:0 1px 0 rgba(255,255,255,0.10) inset,0 2px 12px rgba(0,0,0,0.25);}
.task-item::before{content:'';position:absolute;top:0;left:15%;right:15%;height:1px;background:linear-gradient(90deg,transparent,rgba(255,255,255,1) 50%,transparent);}
.task-item:hover{transform:translateY(-18px) scale(1.038);box-shadow:0 1px 0 rgba(255,255,255,0.90) inset,0 40px 80px rgba(140,128,116,0.18),0 12px 30px rgba(150,138,126,0.12);background:rgba(255,255,255,0.70);border-color:var(--accent);z-index:20;}
[data-theme="dark"] .task-item:hover{background:rgba(255,255,255,0.16);border-color:hsl(var(--ah),var(--as),45%);}
.task-item.dragging{opacity:0.40;transform:scale(0.97);box-shadow:none;}
.task-item.drag-over{border-color:var(--accent);background:rgba(255,255,255,0.70);}
.past-view .task-item:hover{transform:none !important;box-shadow:0 1px 0 rgba(255,255,255,0.90) inset,0 2px 10px rgba(0,0,0,0.04) !important;background:rgba(255,255,255,0.44) !important;}
[data-theme="dark"] .past-view .task-item:hover{background:rgba(255,255,255,0.08) !important;}
@keyframes fadeUp{from{opacity:0;transform:translateY(14px);}to{opacity:1;transform:translateY(0);}}
.drag-handle{color:rgba(26,20,16,0.18);font-size:13px;cursor:grab;padding:2px 0;flex-shrink:0;touch-action:none;line-height:1;user-select:none;}
[data-theme="dark"] .drag-handle{color:rgba(240,235,226,0.22);}
.drag-handle:active{cursor:grabbing;}
.task-main-row{display:flex;align-items:center;gap:12px;width:100%;}
.task-label{flex:1;font-family:'Noto Serif JP',serif;font-weight:300;font-size:13px;letter-spacing:0.05em;text-align:center;color:rgba(26,20,16,0.82);transition:all 0.22s;}
.task-label-spacer{width:22px;flex-shrink:0;}
.memo-row{width:100%;padding:8px 4px 2px 34px;display:none;}
.memo-row.open{display:block;}
.memo-input{width:100%;background:transparent;border:none;border-bottom:1px solid rgba(26,20,16,0.10);font-family:'Noto Serif JP',serif;font-size:16px;font-weight:300;color:rgba(26,20,16,0.55);outline:none;padding:4px 0;letter-spacing:0.04em;resize:none;height:32px;line-height:1.5;user-select:text;-webkit-user-select:text;-webkit-touch-callout:default;}
[data-theme="dark"] .memo-input{border-bottom-color:rgba(240,235,226,0.14);color:rgba(240,235,226,0.55);}
.memo-input::placeholder{color:rgba(26,20,16,0.22);}
[data-theme="dark"] .memo-input::placeholder{color:rgba(240,235,226,0.22);}
.memo-dot{width:5px;height:5px;border-radius:50%;background:var(--accent);opacity:0.7;flex-shrink:0;}
.check-btn{width:22px;height:22px;border-radius:50%;border:1.5px solid rgba(26,20,16,0.20);display:flex;align-items:center;justify-content:center;flex-shrink:0;font-size:11px;color:transparent;transition:all 0.22s;background:rgba(255,255,255,0.52);}
[data-theme="dark"] .check-btn{border-color:rgba(240,235,226,0.30);background:rgba(255,255,255,0.08);}
.check-btn:hover{border-color:var(--accent);}
.task-item.done .check-btn{background:var(--accent);border-color:var(--accent);color:#fff;}
.bucket-check{width:22px;height:22px;border-radius:5px;border:1.5px solid rgba(26,20,16,0.20);display:flex;align-items:center;justify-content:center;flex-shrink:0;font-size:11px;color:transparent;transition:all 0.22s;background:rgba(255,255,255,0.52);}
[data-theme="dark"] .bucket-check{border-color:rgba(240,235,226,0.30);background:rgba(255,255,255,0.08);}
.bucket-check:hover{border-color:var(--accent);}
.task-item.done .bucket-check{background:var(--accent);border-color:var(--accent);color:#fff;}
.task-label{flex:1;font-family:'Noto Serif JP',serif;font-weight:300;font-size:13px;letter-spacing:0.05em;text-align:center;color:rgba(26,20,16,0.82);transition:all 0.22s;}
[data-theme="dark"] .task-label{color:rgba(240,235,226,0.90);}
.task-item.done .task-label{text-decoration:line-through;color:rgba(26,20,16,0.25);}
[data-theme="dark"] .task-item.done .task-label{color:rgba(240,235,226,0.25);}
.carried-mark{font-size:9px;opacity:0.45;margin-left:5px;}
.cat-badge{font-size:9px;font-family:'Noto Sans JP',sans-serif;font-weight:300;letter-spacing:0.04em;color:rgba(26,20,16,0.32);padding:2px 7px;border-radius:6px;border:1px solid rgba(26,20,16,0.07);white-space:nowrap;flex-shrink:0;background:rgba(255,255,255,0.52);}
[data-theme="dark"] .cat-badge{color:rgba(240,235,226,0.35);border-color:rgba(240,235,226,0.12);background:rgba(255,255,255,0.08);}
.del-btn{color:rgba(26,20,16,0.22);font-size:12px;padding:4px 5px;border-radius:6px;transition:color 0.2s,transform 0.2s;line-height:1;flex-shrink:0;}
[data-theme="dark"] .del-btn{color:rgba(240,235,226,0.28);}
.del-btn:hover{color:hsl(5,55%,55%);transform:scale(1.2);}
.empty-msg{text-align:center;color:rgba(26,20,16,0.25);font-family:'Cormorant Garamond',serif;font-style:italic;font-size:15px;padding:18px 0 4px;}
[data-theme="dark"] .empty-msg{color:rgba(240,235,226,0.30);}
.stats-line{text-align:center;margin-top:14px;font-family:'Noto Serif JP',serif;font-weight:200;font-size:11px;color:rgba(26,20,16,0.25);letter-spacing:0.10em;position:relative;z-index:1;}
[data-theme="dark"] .stats-line{color:rgba(240,235,226,0.30);}

/* SWIPE HINT */
.swipe-hint{position:fixed;bottom:32px;left:50%;transform:translateX(-50%);font-family:'Noto Serif JP',serif;font-size:9px;letter-spacing:0.20em;color:rgba(26,20,16,0.18);pointer-events:none;z-index:10;transition:opacity 0.4s;}
[data-theme="dark"] .swipe-hint{color:rgba(240,235,226,0.16);}

/* CARRY DIALOG */
.overlay{position:fixed;inset:0;z-index:600;display:flex;align-items:center;justify-content:center;background:rgba(0,0,0,0.15);backdrop-filter:blur(10px);-webkit-backdrop-filter:blur(10px);animation:fadeIn 0.22s ease;}
.overlay.hidden{display:none;}
@keyframes fadeIn{from{opacity:0;}to{opacity:1;}}
.dialog{background:rgba(255,255,255,0.90);backdrop-filter:blur(40px);border:1px solid rgba(255,255,255,0.96);border-radius:28px;padding:38px 32px 30px;max-width:320px;width:88%;text-align:center;box-shadow:0 28px 64px rgba(0,0,0,0.11);animation:popIn 0.26s ease;}
[data-theme="dark"] .dialog{background:rgba(38,34,30,0.94);border-color:rgba(255,255,255,0.16);}
.dialog-icon{font-size:30px;margin-bottom:14px;}
.dialog-ttl{font-family:'Cormorant Garamond',serif;font-style:italic;font-weight:300;font-size:22px;color:rgba(26,20,16,0.68);margin-bottom:8px;}
[data-theme="dark"] .dialog-ttl{color:rgba(240,235,226,0.78);}
.dialog-sub{font-family:'Noto Serif JP',serif;font-weight:200;font-size:12px;color:rgba(26,20,16,0.45);line-height:1.9;margin-bottom:4px;}
[data-theme="dark"] .dialog-sub{color:rgba(240,235,226,0.48);}
.dialog-cnt{font-family:'Cormorant Garamond',serif;font-style:italic;font-size:15px;color:var(--accent);margin-bottom:26px;}
.dialog-actions{display:flex;gap:10px;justify-content:center;}
.dbtn{padding:10px 22px;border-radius:14px;font-family:'Noto Serif JP',serif;font-size:12px;letter-spacing:0.06em;transition:all 0.2s;}
.dbtn.ok{background:var(--accent);color:#fff;box-shadow:0 4px 14px hsl(var(--ah),var(--as),var(--al),0.32);}
.dbtn.ok:hover{opacity:0.88;transform:translateY(-1px);}
.dbtn.no{background:rgba(26,20,16,0.06);color:rgba(26,20,16,0.52);}
[data-theme="dark"] .dbtn.no{background:rgba(255,255,255,0.10);color:rgba(240,235,226,0.52);}
.dbtn.no:hover{background:rgba(26,20,16,0.10);}
</style>

<script>
/* Audio */
const AC=window.AudioContext||window.webkitAudioContext;let _ac=null;
const ac=()=>{if(!_ac)_ac=new AC();return _ac;};
function bell(freqs,decay=0.7,vol=0.11){const c=ac();freqs.forEach(([f,d=0,v=vol])=>{const o=c.createOscillator(),g=c.createGain(),cmp=c.createDynamicsCompressor();o.connect(g);g.connect(cmp);cmp.connect(c.destination);o.type='sine';o.frequency.value=f;g.gain.setValueAtTime(0,c.currentTime+d);g.gain.linearRampToValueAtTime(v,c.currentTime+d+0.008);g.gain.exponentialRampToValueAtTime(0.001,c.currentTime+d+decay);o.start(c.currentTime+d);o.stop(c.currentTime+d+decay+0.05);})}
const vib=p=>navigator.vibrate&&navigator.vibrate(p);
function playAdd(){bell([[1047,0,0.10],[1319,0.06,0.09],[1568,0.12,0.08],[2093,0.18,0.07]],0.75);vib([12,50,8]);}
function playCheck(){bell([[1568,0,0.12],[2349,0.09,0.10],[3136,0.17,0.07]],0.85);vib(18);}
function playDelete(){bell([[880,0,0.10],[740,0.08,0.08]],0.45);vib([8,40,8]);}
function playCatAdd(){bell([[1319,0,0.09],[1661,0.06,0.08],[1976,0.11,0.07]],0.65);vib(10);}
function playAllDone(){const c=ac();[[523,0,0.13],[659,0.10,0.12],[784,0.20,0.11],[1047,0.30,0.13],[1319,0.42,0.11]].forEach(([f,d,v])=>{const o=c.createOscillator(),g=c.createGain(),cmp=c.createDynamicsCompressor();o.connect(g);g.connect(cmp);cmp.connect(c.destination);o.type='sine';o.frequency.value=f;g.gain.setValueAtTime(0,c.currentTime+d);g.gain.linearRampToValueAtTime(v,c.currentTime+d+0.01);g.gain.exponentialRampToValueAtTime(0.001,c.currentTime+d+1.0);o.start(c.currentTime+d);o.stop(c.currentTime+d+1.1);});[[2093,0.55,0.08],[2637,0.62,0.07],[3136,0.68,0.06]].forEach(([f,d,v])=>{const o=c.createOscillator(),g=c.createGain(),cmp=c.createDynamicsCompressor();o.connect(g);g.connect(cmp);cmp.connect(c.destination);o.type='sine';o.frequency.value=f;g.gain.setValueAtTime(0,c.currentTime+d);g.gain.linearRampToValueAtTime(v,c.currentTime+d+0.008);g.gain.exponentialRampToValueAtTime(0.001,c.currentTime+d+0.6);o.start(c.currentTime+d);o.stop(c.currentTime+d+0.7);});vib([15,40,15,40,30]);}

/* Accent */
const SWATCHES=['#f2efeb','#a8bec8','#a8bdb4','#bdb4c8','#c8b4b0','#bfb89a','#a4bab8','#c8baa4','#baaab6','#7a7570','#9a8468','#7a6a8a','#4e7868','#8a5a50','#506080','#6a5448'];
function hexToHsl(hex){let r=parseInt(hex.slice(1,3),16)/255,g=parseInt(hex.slice(3,5),16)/255,b=parseInt(hex.slice(5,7),16)/255;const mx=Math.max(r,g,b),mn=Math.min(r,g,b);let h,s,l=(mx+mn)/2;if(mx===mn){h=s=0;}else{const d=mx-mn;s=l>.5?d/(2-mx-mn):d/(mx+mn);switch(mx){case r:h=(g-b)/d+(g<b?6:0);break;case g:h=(b-r)/d+2;break;case b:h=(r-g)/d+4;break;}h/=6;}return[Math.round(h*360),Math.round(s*100),Math.round(l*100)];}
function applyAccent(hex){
  const[h,s,l]=hexToHsl(hex),r=document.documentElement;
  r.style.setProperty('--ah',h);r.style.setProperty('--as',s+'%');r.style.setProperty('--al',l+'%');
  r.style.setProperty('--accent',`hsl(${h},${s}%,${l}%)`);
  const ri=parseInt(hex.slice(1,3),16),gi=parseInt(hex.slice(3,5),16),bi=parseInt(hex.slice(5,7),16);
  r.style.setProperty('--ar',ri);r.style.setProperty('--ag',gi);r.style.setProperty('--ab',bi);
  const isDark=document.documentElement.getAttribute('data-theme')==='dark';
  if(isDark){document.body.style.background=`linear-gradient(145deg,hsl(${h},25%,8%) 0%,hsl(${h},18%,11%) 40%,hsl(${(h+40)%360},15%,9%) 70%,hsl(${(h+80)%360},12%,8%) 100%)`;}
  else{document.body.style.background=`linear-gradient(135deg,hsl(${h},30%,97%) 0%,hsl(${(h+20)%360},25%,97%) 50%,hsl(${(h+40)%360},20%,96%) 100%)`;}
  localStorage.setItem('accent-v8',hex);renderSwatches(hex);
}
function renderSwatches(a){const el=document.getElementById('swatches');el.innerHTML='';SWATCHES.forEach(hex=>{const d=document.createElement('div');d.className='swatch'+(hex===a?' active':'');d.style.background=hex;d.onclick=()=>{applyAccent(hex);document.getElementById('customColor').value=hex;};el.appendChild(d);});}
function toggleColorPanel(){document.getElementById('colorPanel').classList.toggle('open');}
document.addEventListener('click',e=>{if(!document.querySelector('.color-picker-wrap').contains(e.target))document.getElementById('colorPanel').classList.remove('open');});

/* Theme */
let dark=localStorage.getItem('theme-v8')==='dark';
function applyTheme(){document.documentElement.setAttribute('data-theme',dark?'dark':'light');const b=document.getElementById('themeBtn');if(b)b.textContent=dark?'☀️':'🌙';applyAccent(localStorage.getItem('accent-v8')||'#a8bec8');}
function toggleTheme(){dark=!dark;localStorage.setItem('theme-v8',dark?'dark':'light');applyTheme();}
applyTheme();

/* Date */
const toKey=d=>`${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}-${String(d.getDate()).padStart(2,'0')}`;
const TODAY=toKey(new Date());
let viewDate=TODAY;
const isPast=()=>viewDate<TODAY;

function dateLabel(key){
  const [y,m,d]=key.split('-').map(Number);
  const dt=new Date(y,m-1,d);
  const base=dt.toLocaleDateString('ja-JP',{year:'numeric',month:'long',day:'numeric',weekday:'long'});
  const diff=Math.round((new Date(TODAY.split('-')[0],TODAY.split('-')[1]-1,TODAY.split('-')[2])- dt)/86400000);
  if(diff===0)return base;
  if(diff===1)return base+'  ·  昨日';
  return base+`  ·  ${diff}日前`;
}

/* Storage */
function loadGlobal(){return JSON.parse(localStorage.getItem('diary-global-v1')||'null')||{cats:['仕事','買い物','家事','プライベート'],bucket:[{id:10,text:'ヨーロッパを旅行する',done:false},{id:11,text:'フランス語を学ぶ',done:false},{id:12,text:'マラソンに出場する',done:false}],activeCat:'すべて'};}
function saveGlobal(){localStorage.setItem('diary-global-v1',JSON.stringify(G));}
function loadDay(k){return JSON.parse(localStorage.getItem('diary-day-'+k)||'null')||{todos:[]};}
function saveDay(k,v){localStorage.setItem('diary-day-'+k,JSON.stringify(v));}

let G=loadGlobal();
let D=loadDay(TODAY);

/* Migrate old data */
const old=JSON.parse(localStorage.getItem('diary-v6')||'null');
if(old&&!localStorage.getItem('diary-global-v1')){
  G.cats=old.cats||G.cats;G.bucket=old.bucket||G.bucket;
  if(old.todos?.length){D.todos=old.todos;saveDay(TODAY,D);}
  saveGlobal();
}

/* Carry-over */
let _carryTodos=[];
function checkCarry(){
  if(localStorage.getItem('diary-last-seen')===TODAY)return;
  const yest=new Date();yest.setDate(yest.getDate()-1);
  const yk=toKey(yest);
  const yd=loadDay(yk);
  const undone=yd.todos.filter(t=>!t.done);
  if(!undone.length){localStorage.setItem('diary-last-seen',TODAY);return;}
  _carryTodos=undone;
  document.getElementById('carryCount').textContent=`未完了 ${undone.length} 件`;
  document.getElementById('carryOverlay').classList.remove('hidden');
}
function doCarry(){
  _carryTodos.forEach(t=>D.todos.push({...t,id:Date.now()+Math.random(),carried:true}));
  saveDay(TODAY,D);localStorage.setItem('diary-last-seen',TODAY);
  document.getElementById('carryOverlay').classList.add('hidden');
  renderTodos();
}
function dismissCarry(){localStorage.setItem('diary-last-seen',TODAY);document.getElementById('carryOverlay').classList.add('hidden');}

/* Navigation */
let _sliding=false;
function navigate(delta){
  if(_sliding)return;
  const nxt=new Date(viewDate.split('-')[0],viewDate.split('-')[1]-1,viewDate.split('-')[2]);
  nxt.setDate(nxt.getDate()+delta);
  const nk=toKey(nxt);
  if(nk>TODAY)return;
  _sliding=true;
  const w=document.getElementById('wrapper');
  const outCls=delta<0?'slide-left-out':'slide-right-out';
  const inCls=delta<0?'slide-left-in':'slide-right-in';
  w.classList.add(outCls);
  setTimeout(()=>{
    viewDate=nk;
    D=loadDay(viewDate);
    G.activeCat='すべて';
    updateDateUI();renderCats();renderTodos();
    w.classList.remove(outCls);
    w.classList.add(inCls);
    requestAnimationFrame(()=>requestAnimationFrame(()=>{
      w.style.transition='transform 0.32s cubic-bezier(.22,.8,.36,1),opacity 0.28s';
      w.classList.remove(inCls);
      setTimeout(()=>{_sliding=false;},340);
    }));
  },300);
}

function updateDateUI(){
  const el=document.getElementById('dateEl');
  el.textContent=dateLabel(viewDate);
  el.className='date-line'+(isPast()?' past':'');
  document.getElementById('prevBtn').disabled=false;
  document.getElementById('nextBtn').disabled=!isPast();
  // past mode
  const past=isPast();
  document.getElementById('pastNote').style.display=past?'block':'none';
  document.getElementById('todoAddRow').style.display=past?'none':'';
  document.getElementById('catManage').style.display=past?'none':'';
  document.getElementById('tasksCard').classList.toggle('past-view',past);
  document.getElementById('swipeHint').style.opacity=past?'0':'1';
  // bucket always editable
}

/* Touch swipe */
let tx=0,ty=0;
document.addEventListener('touchstart',e=>{tx=e.touches[0].clientX;ty=e.touches[0].clientY;},{passive:true});
document.addEventListener('touchend',e=>{
  const dx=e.changedTouches[0].clientX-tx,dy=e.changedTouches[0].clientY-ty;
  if(Math.abs(dx)>55&&Math.abs(dx)>Math.abs(dy)*1.4){navigate(dx<0?-1:1);}
},{passive:true});

/* Cats */
const esc=s=>s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
let editCatMode=false,addCatOpen=false;
function renderCats(){
  const el=document.getElementById('catTabs');el.innerHTML='';
  const all=document.createElement('button');
  all.className='cat-tab'+(G.activeCat==='すべて'?' active':'');
  all.textContent='すべて';all.onclick=()=>{G.activeCat='すべて';saveGlobal();renderTodos();renderCats();};
  el.appendChild(all);
  G.cats.forEach(c=>{
    const b=document.createElement('button');
    const editable=!isPast()&&editCatMode;
    b.className='cat-tab'+(G.activeCat===c?' active':'')+(editable?' edit-mode':'');
    if(editable){b.innerHTML=`${esc(c)}<span class="del-cat" onclick="deleteCat(event,'${esc(c)}')">✕</span>`;}
    else{b.textContent=c;b.onclick=()=>{G.activeCat=c;saveGlobal();renderTodos();renderCats();};}
    el.appendChild(b);
  });
  document.getElementById('editCatBtn').classList.toggle('active',editCatMode);
  document.getElementById('addCatBtn').classList.toggle('active',addCatOpen);
}
function toggleAddCat(){if(isPast())return;addCatOpen=!addCatOpen;document.getElementById('addCatRow').classList.toggle('open',addCatOpen);if(addCatOpen)setTimeout(()=>document.getElementById('addCatInput').focus(),50);renderCats();}
function confirmAddCat(){const inp=document.getElementById('addCatInput'),name=inp.value.trim();if(!name||G.cats.includes(name))return;G.cats.push(name);inp.value='';addCatOpen=false;document.getElementById('addCatRow').classList.remove('open');saveGlobal();renderCats();playCatAdd();}
function toggleEditCat(){if(isPast())return;editCatMode=!editCatMode;if(editCatMode){addCatOpen=false;document.getElementById('addCatRow').classList.remove('open');}renderCats();}
function deleteCat(e,cat){e.stopPropagation();if(G.cats.length<=1)return;G.cats=G.cats.filter(c=>c!==cat);D.todos.forEach(t=>{if(t.cat===cat)t.cat=G.cats[0];});if(G.activeCat===cat)G.activeCat='すべて';saveGlobal();saveDay(viewDate,D);renderCats();renderTodos();playDelete();}
document.getElementById('addCatInput').addEventListener('keydown',e=>{if(e.key==='Enter')confirmAddCat();});

/* Todos */
function renderTodos(){
  const list=document.getElementById('todoList'),stats=document.getElementById('todoStats');
  list.innerHTML='';
  const f=G.activeCat==='すべて'?D.todos:D.todos.filter(t=>t.cat===G.activeCat);
  if(!f.length){list.innerHTML=`<p class="empty-msg">${isPast()?'この日のタスクはありません':'タスクがありません'}</p>`;stats.textContent='';return;}
  f.forEach((t,i)=>{
    const el=document.createElement('div');
    el.className='task-item'+(t.done?' done':'');
    el.style.animationDelay=(i*0.05)+'s';
    el.dataset.id=t.id;
    const carry=t.carried?'<span class="carried-mark">↑</span>':'';
    const memoDot=t.memo?'<span class="memo-dot"></span>':'';
    if(isPast()){
      el.innerHTML=`<div class="task-main-row"><div class="check-btn" style="pointer-events:none">${t.done?'✓':''}</div><span class="task-label">${esc(t.text)}${carry}</span><span class="cat-badge">${esc(t.cat)}</span></div>${t.memo?`<div class="memo-row open"><div style="font-family:'Noto Serif JP',serif;font-size:12px;color:rgba(26,20,16,0.45);padding:4px 0;">${esc(t.memo)}</div></div>`:''}`;
    } else {
      el.innerHTML=`<div class="task-main-row"><button class="check-btn" onclick="toggleTodo(${t.id})">${t.done?'✓':''}</button><span class="task-label" onclick="toggleMemo(${t.id},this)">${esc(t.text)}${carry}</span>${memoDot}<span class="cat-badge">${esc(t.cat)}</span><button class="del-btn" onclick="delTodo(${t.id})">✕</button></div><div class="memo-row${t.memo||t._memoOpen?' open':''}" id="memo-${t.id}"><input class="memo-input" placeholder="メモを追加…" value="${esc(t.memo||'')}" oninput="saveMemo(${t.id},this.value)" /></div>`;
      // long-press to drag
      let pressTimer=null;
      el.addEventListener('touchstart',e=>{
        pressTimer=setTimeout(()=>{el.style.transform='scale(1.03)';el.style.transition='transform 0.12s';vib(15);startDrag(e,el,t.id);},200);
      },{passive:true});
      el.addEventListener('touchend',()=>{clearTimeout(pressTimer);if(!_drag.id)el.style.transform='';},{passive:true});
      el.addEventListener('touchmove',()=>{clearTimeout(pressTimer);},{passive:true});
      el.addEventListener('mousedown',e=>{if(e.button!==0)return;pressTimer=setTimeout(()=>{startDrag(e,el,t.id);},200);});
      el.addEventListener('mouseup',()=>clearTimeout(pressTimer));
      el.addEventListener('mousemove',()=>clearTimeout(pressTimer));
    }
    list.appendChild(el);
  });
  const done=f.filter(t=>t.done).length;
  stats.textContent=`${done} / ${f.length} completed`;
}
function toggleMemo(id,labelEl){
  const t=D.todos.find(t=>t.id===id);if(!t)return;
  const row=document.getElementById('memo-'+id);
  if(!row)return;
  const isOpen=row.classList.toggle('open');
  t._memoOpen=isOpen;
  if(isOpen)setTimeout(()=>row.querySelector('input')?.focus(),50);
}
function saveMemo(id,val){
  const t=D.todos.find(t=>t.id===id);if(!t)return;
  t.memo=val.trim();
  saveDay(TODAY,D);
  // update dot without re-render
  const item=document.querySelector(`.task-item[data-id="${id}"]`);
  if(!item)return;
  const existing=item.querySelector('.memo-dot');
  if(t.memo&&!existing){
    const badge=item.querySelector('.cat-badge');
    if(badge){const dot=document.createElement('span');dot.className='memo-dot';badge.before(dot);}
  } else if(!t.memo&&existing){existing.remove();}
}
/* ── Drag & Drop ── */
let _drag={id:null,el:null,clone:null,startY:0,offsetY:0};
function startDrag(e,el,id){
  if(isPast())return;
  e.preventDefault();
  const clientY=e.touches?e.touches[0].clientY:e.clientY;
  _drag.id=id;_drag.el=el;
  _drag.startY=clientY;
  const rect=el.getBoundingClientRect();
  _drag.offsetY=clientY-rect.top;
  // clone
  const clone=el.cloneNode(true);
  clone.style.cssText=`position:fixed;left:${rect.left}px;top:${rect.top}px;width:${rect.width}px;z-index:999;opacity:0.92;pointer-events:none;transition:none;box-shadow:0 20px 60px rgba(0,0,0,0.18);transform:scale(1.02);`;
  document.body.appendChild(clone);
  _drag.clone=clone;
  el.classList.add('dragging');
  document.addEventListener('mousemove',onDrag);
  document.addEventListener('touchmove',onDrag,{passive:false});
  document.addEventListener('mouseup',endDrag);
  document.addEventListener('touchend',endDrag);
}
function onDrag(e){
  if(!_drag.clone)return;
  e.preventDefault();
  const clientY=e.touches?e.touches[0].clientY:e.clientY;
  _drag.clone.style.top=(clientY-_drag.offsetY)+'px';
  // find target
  document.querySelectorAll('.task-item:not(.dragging)').forEach(el=>el.classList.remove('drag-over'));
  const target=getDragTarget(clientY);
  if(target)target.classList.add('drag-over');
}
function getDragTarget(clientY){
  let closest=null,minDist=Infinity;
  document.querySelectorAll('.task-item:not(.dragging)').forEach(el=>{
    const r=el.getBoundingClientRect();
    const mid=r.top+r.height/2;
    const d=Math.abs(clientY-mid);
    if(d<minDist){minDist=d;closest=el;}
  });
  return closest;
}
function endDrag(e){
  document.removeEventListener('mousemove',onDrag);
  document.removeEventListener('touchmove',onDrag);
  document.removeEventListener('mouseup',endDrag);
  document.removeEventListener('touchend',endDrag);
  if(!_drag.clone)return;
  _drag.clone.remove();_drag.clone=null;
  _drag.el.classList.remove('dragging');
  document.querySelectorAll('.drag-over').forEach(el=>el.classList.remove('drag-over'));
  const clientY=e.touches?e.changedTouches[0].clientY:e.clientY;
  const target=getDragTarget(clientY);
  if(target&&target.dataset.id){
    const fromId=_drag.id;
    const toId=Number(target.dataset.id);
    if(fromId!==toId){
      const fromIdx=D.todos.findIndex(t=>t.id===fromId);
      const toIdx=D.todos.findIndex(t=>t.id===toId);
      if(fromIdx!==-1&&toIdx!==-1){
        const [item]=D.todos.splice(fromIdx,1);
        D.todos.splice(toIdx,0,item);
        saveDay(TODAY,D);vib(12);
        renderTodos();
      }
    }
  }
  _drag={id:null,el:null,clone:null,startY:0,offsetY:0};
}
function addTodo(){
  if(isPast())return;
  const inp=document.getElementById('todoInput'),text=inp.value.trim();if(!text)return;
  const cat=G.activeCat==='すべて'?(G.cats[0]||'仕事'):G.activeCat;
  D.todos.unshift({id:Date.now(),text,cat,done:false,memo:''});
  inp.value='';saveDay(TODAY,D);renderTodos();playAdd();
}
function toggleTodo(id){
  if(isPast())return;
  const t=D.todos.find(t=>t.id===id);if(!t)return;
  t.done=!t.done;saveDay(TODAY,D);renderTodos();
  if(t.done){const v=G.activeCat==='すべて'?D.todos:D.todos.filter(t=>t.cat===G.activeCat);if(v.length&&v.every(t=>t.done)){playAllDone();}else{playCheck();}}else{playCheck();}
}
function delTodo(id){if(isPast())return;D.todos=D.todos.filter(t=>t.id!==id);saveDay(TODAY,D);renderTodos();playDelete();}

/* Bucket */
function renderBucket(){
  const list=document.getElementById('bucketList'),stats=document.getElementById('bucketStats');
  list.innerHTML='';
  if(!G.bucket.length){list.innerHTML='<p class="empty-msg">やりたいことを追加しよう</p>';stats.textContent='';return;}
  G.bucket.forEach((b,i)=>{
    const el=document.createElement('div');
    el.className='task-item'+(b.done?' done':'');el.style.animationDelay=(i*0.05)+'s';
    el.innerHTML=`<button class="bucket-check" onclick="toggleBucket(${b.id})">${b.done?'✓':''}</button><span class="task-label">${esc(b.text)}</span><button class="del-btn" onclick="delBucket(${b.id})">✕</button>`;
    list.appendChild(el);
  });
  const done=G.bucket.filter(b=>b.done).length;
  stats.textContent=`${done} / ${G.bucket.length} achieved`;
}
function addBucket(){const inp=document.getElementById('bucketInput'),text=inp.value.trim();if(!text)return;G.bucket.unshift({id:Date.now(),text,done:false});inp.value='';saveGlobal();renderBucket();playAdd();}
function toggleBucket(id){const b=G.bucket.find(b=>b.id===id);if(b){b.done=!b.done;saveGlobal();renderBucket();playCheck();}}
